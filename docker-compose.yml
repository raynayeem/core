services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: core-cms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend/uploads:/app/uploads
    expose:
      - "5000"

  frontend-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_UPLOAD_URL: ${VITE_UPLOAD_URL:-}
    container_name: core-cms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_UPSTREAM_PORT:-8080}:80"